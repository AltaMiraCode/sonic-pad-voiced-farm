# shaper.cfg - input-shaping controls, self-contained. Always included on every
# printer. One button does everything:
#   RUN_INPUT_SHAPER - point the shared accelerometer at THIS printer, restart to
#                      grab it, then auto home + run the X/Y resonance calibration.
# To fully release the sensor before unplugging it for good: "~/shape.sh off"
# on the pad (the SHAPER_OFF button was retired - moving to the next printer
# releases the previous one automatically anyway).
# (Grabbing the sensor needs a Klipper restart, which a macro can't run "through",
#  so shape.sh spawns a detached job that resumes the calibration after reboot.)

# M118 console messages below need the [respond] module. These printers don't
# have it (that's why M118 was "unknown"), so enable it here. If you ever add
# [respond] to printer.cfg too, remove THIS one - Klipper errors on duplicates.
[respond]

[gcode_shell_command shape]
command: /home/sonic/shape.sh
timeout: 60

[gcode_macro RUN_INPUT_SHAPER]
description: One button for the whole X/Y resonance calibration - press to start, press again after moving the sensor to the bed to resume Y
gcode:
    {% set N = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if printer.print_stats.state in ("printing", "paused") %}
      { action_raise_error("Refusing - this printer is %s and input shaping restarts it. Finish or cancel the print first." % printer.print_stats.state) }
    {% elif N == "" %}
      { action_respond_info("machine.cfg not loaded - cannot identify this printer") }
    {% else %}
      M117 Input shaping {N}...
      M118 Input shaping {N}: it restarts, homes, and measures X, then PAUSES for you to move the sensor to the bed - just press RUN_INPUT_SHAPER again to resume Y. Saves both axes automatically (no manual SAVE_CONFIG).
      RUN_SHELL_COMMAND CMD=shape PARAMS="{N} smart"
    {% endif %}

[gcode_macro _SHAPER_DONE]
description: internal - completion notice fired by shape-run.sh after the calibration
gcode:
    M118 Input shaping complete - saving automatically. Move the sensor to the next printer, or run "~/shape.sh off" on the pad before unplugging it for good.
    M117 Shaper done - saving
