# /etc/asound.conf - ALSA software mixing (dmix) for the Sonic Pad speaker.
#
# WHY: without this, two sounds at once fight for the raw hw device and the
# second one DIES with "device busy" - the journal's "audio failed rc=1" lines.
# Chimes are designed to overlap voices; dmix lets them actually mix.
#
# Install:   sudo cp ~/asound.conf /etc/asound.conf     (takes effect on next play)
# Test:      aplay ~/chimes/done.wav & aplay ~/voicebank/omega_back_online.wav
#            (both should be heard together, neither killed)
# Rollback:  sudo rm /etc/asound.conf                   (back to raw hw access)

pcm.!default {
    type plug              # auto-convert any wav rate/format to the slave's
    slave.pcm "dmixer"
}

pcm.dmixer {
    type dmix
    ipc_key 1024
    ipc_perm 0666          # all users (daemon + klipper shell commands) share it
    slave {
        pcm "hw:0,0"
        period_time 0
        period_size 1024
        buffer_size 8192
        rate 48000
        format S16_LE
        channels 2
    }
}

ctl.!default {
    type hw
    card 0                 # amixer keeps talking to the real card controls
}
