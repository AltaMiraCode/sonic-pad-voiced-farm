# cameras.conf - maps each camera to a role + its own ustreamer stream port.
# usb-watch.sh reads this on every scan (no restart needed to add a camera).
#
#   <key>   <role>     <stream-port>
# key   = the camera's /dev/v4l/by-id name (preferred - true device identity,
#         works in any port) OR its /dev/v4l/by-path name (position identity,
#         for cheap cams that ship no serial).
# role  = "farm" for the shared view every printer's Fluidd shows, or a printer
#         name (omega/unicorn/...) for a dedicated per-printer camera.
# port  = 8080 for the farm cam; 8081, 8082, ... for additional cameras.
#
# With NO entries here, the first camera on /dev/video0 auto-adopts as the farm
# view on :8080 - exactly the single-camera behavior from before. Add lines only
# when you run more than one camera. Find a plugged camera's key with:
#   ls -l /dev/v4l/by-id/    (or /dev/v4l/by-path/)
#
# examples (commented - fill in real keys on camera day):
# usb-046d_HD_Pro_Webcam_C920_ABC123-video-index0   farm     8080
# usb-Generic_USB_Camera-video-index0               trident  8081
