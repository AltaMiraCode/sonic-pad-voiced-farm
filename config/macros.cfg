# =====================================================================
# macros.cfg — SHARED fleet macro set (Omega, Unicorn, Dimeter, Trident)
# One identical copy lives in each printer's config folder.
# Deploy per MACROS-GUIDE.md: add [include macros.cfg] to printer.cfg
# and DELETE the old macro sections it replaces (list in the guide).
#
# Naming conventions:
#   VERB_NOUN, grouped by prefix so Fluidd's list self-organizes:
#     PRINT_*  FILAMENT_*  TUNE_*  LIGHTS_*  BED_*  NOZZLE_*  MOTORS_*
#   _underscore prefix = internal helper, hidden from Fluidd's buttons.
#   PAUSE / RESUME / CANCEL_PRINT / G29 / M420 / M600 keep their names:
#   Fluidd's buttons and slicer output call these literally.
# =====================================================================


# ------------------------------- PRINT --------------------------------

[gcode_macro PRINT_START]
description: Fleet-standard start: heat, home, adaptive mesh, purge. Called by the slicer.
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(210)|float %}
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}   ; name from each printer's machine.cfg; case must match the [gcode_macro _MACHINE] section exactly. safe (no narration) if absent
    LIGHTS_ON
    M117 Preheating...
    ; daemon speaks "{name} preheating" + chime as the job begins
    M220 S100                         ; reset any leftover speed override
    M221 S100                         ; reset any leftover flow override
    G90
    M83
    M140 S{BED}                       ; start bed heating
    M104 S150                         ; nozzle to no-ooze standby temp
    G28                               ; home all WHILE the bed heats (saves ~30s/print)
    M190 S{BED}                       ; wait for bed
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} bed temperature reached"{% endif %}
    M117 Leveling...
    ; the BED_MESH_CALIBRATE wrapper narrates "probing print area" (adaptive with
    ; object outlines) or "leveling bed" (full mesh) - same line from any UI
    BED_MESH_CALIBRATE ADAPTIVE=1     ; probe only under this print (full mesh if no object data)
    M104 S{EXTRUDER}                  ; final nozzle temp while traveling
    G0 X5 Y5 Z10 F6000                ; move to purge corner
    M400                              ; head has ARRIVED at the wait spot...
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} waiting on nozzle temperature"{% endif %}
    M109 S{EXTRUDER}                  ; wait for nozzle
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} nozzle temperature reached"{% endif %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} purging"{% endif %}
    _PURGE_LINE
    G92 E0                            ; zero the extruder for the sliced file
    M82                               ; absolute E - Cura's convention (relative slicers emit M83 themselves)
    M117 Printing
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} starting print"{% endif %}

[gcode_macro PRINT_END]
description: Fleet-standard end: retract, present print, everything off.
gcode:
    M400                              ; finish moves
    {% if printer.extruder.can_extrude|lower == 'true' %}
      M83
      G1 E-3 F2700                    ; retract to kill ooze (skip if nozzle cold -
    {% endif %}                       ; a cold retract would error out and leave heaters on)
    _PARK_SAFE
    TURN_OFF_HEATERS
    M107                              ; part fan off
    M84                               ; motors off
    M117 Print complete


# --------------------- PAUSE / RESUME / CANCEL ------------------------
# Names are fixed (Fluidd's buttons call these). Internals upgraded to
# share the bounded-Z-hop parking helper.

[gcode_macro PAUSE]
description: Pause the running print (retract + park)
rename_existing: PAUSE_BASE
variable_extrude: 1.0
gcode:
    {% if printer.pause_resume.is_paused %}
      {action_respond_info("Already paused")}
    {% else %}
      {% set E = printer["gcode_macro PAUSE"].extrude|float %}
      PAUSE_BASE
      {% if printer.extruder.can_extrude|lower == 'true' %}
        M83
        G1 E-{E} F2100
      {% else %}
        {action_respond_info("Extruder not hot enough to retract")}
      {% endif %}
      _PARK_SAFE
    {% endif %}

[gcode_macro RESUME]
description: Resume the paused print
rename_existing: RESUME_BASE
gcode:
    {% if not printer.pause_resume.is_paused %}
      {action_respond_info("Not paused - nothing to resume")}
    {% else %}
      {% set E = printer["gcode_macro PAUSE"].extrude|float %}
      {% if 'VELOCITY' in params|upper %}
        {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
      {% else %}
        {% set get_params = "" %}
      {% endif %}
      {% if printer.extruder.can_extrude|lower == 'true' %}
        M83
        G1 E{E} F2100
      {% else %}
        {action_respond_info("Extruder not hot enough")}
      {% endif %}
      RESUME_BASE {get_params}
    {% endif %}

[gcode_macro CANCEL_PRINT]
description: Cancel the running print (park + everything off)
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    M107
    _PARK_SAFE
    CANCEL_PRINT_BASE
    M84
    M117 Print canceled


# --------------------------- MAINTENANCE ------------------------------

[gcode_macro TUNE_PID_HOTEND]
description: PID-tune the hotend at TEMP (default 210) with 40% part fan. Narrated; saves automatically.
gcode:
    {% set TEMP = params.TEMP|default(210)|float %}
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} P I D tuning hot end"{% endif %}
    M106 S102
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=calwatch PARAMS="pid {NAME} extruder {TEMP}"{% endif %}
    PID_CALIBRATE HEATER=extruder TARGET={TEMP}
    M107
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} hot end P I D tuning complete"{% endif %}
    M117 Hotend PID saved
    SAVE_CONFIG

[gcode_macro TUNE_PID_BED]
description: PID-tune the bed at TEMP (default 60). Narrated; saves automatically.
gcode:
    {% set TEMP = params.TEMP|default(60)|float %}
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} P I D tuning bed"{% endif %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=calwatch PARAMS="pid {NAME} heater_bed {TEMP}"{% endif %}
    PID_CALIBRATE HEATER=heater_bed TARGET={TEMP}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} bed P I D tuning complete"{% endif %}
    M117 Bed PID saved
    SAVE_CONFIG


[gcode_macro BED_LEVELING]
description: Heat-soaked full-bed mesh. Params BED (60), SOAK_MIN (5). Narrated; saves automatically.
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set SOAK = params.SOAK_MIN|default(5)|float %}
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} starting bed leveling process"{% endif %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} preheating"{% endif %}
    M190 S{BED}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} bed temperature reached. holding"{% endif %}   ; ". holding" = the soak
    M117 Soaking {SOAK} min...
    G4 P{(SOAK * 60000)|int}
    G28
    BED_MESH_CALIBRATE                ; wrapper narrates "leveling bed"
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} bed leveling complete"{% endif %}
    M140 S0
    M117 Mesh saved
    SAVE_CONFIG

[gcode_macro BED_SCREWS]
description: Narrated screws-tilt measurement - prints how far to turn each knob (physical adjust, nothing to save)
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if "screws_tilt_adjust" not in printer.configfile.settings %}
      {action_respond_info("No [screws_tilt_adjust] section on this printer yet - add it (see Omega's) before using BED_SCREWS")}
    {% else %}
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} screw tilt adjust"{% endif %}
      {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
      {% endif %}
      SET_GCODE_VARIABLE MACRO=_CAL_QUIET VARIABLE=q VALUE=1   ; we already announced
      SCREWS_TILT_CALCULATE
      M117 Screw table in console
    {% endif %}

[gcode_macro TUNE_TWIST]
description: Narrated X-gantry twist calibration - paper test at each point, ACCEPT each; announces and saves itself after the last point. Re-run BED_LEVELING after.
gcode:
    ; bedslingers with an offset probe (ours: x -28, y +20) probe WRONG wherever
    ; the X gantry has any twist, and the mesh can't correct it - this measures
    ; the twist once so every future probe is compensated.
    ; Watched by cal-watch.sh OUTSIDE the gcode queue: per-point lines fire the
    ; moment each ACCEPT lands (not after the next probing finishes), an ABORT
    ; announces "twist tuning aborted", and the final ACCEPT announces + saves.
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if "axis_twist_compensation" not in printer.configfile.settings %}
      {action_respond_info("No [axis_twist_compensation] section on this printer yet - add it first (see TUNING-GUIDE)")}
    {% else %}
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} starting twist tuning"{% endif %}
      {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
      {% endif %}
      M117 Paper test each point, ACCEPT each - saves itself after the last
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} probing point one"{% endif %}
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=calwatch PARAMS="twist {NAME}"{% endif %}
      AXIS_TWIST_COMPENSATION_CALIBRATE
    {% endif %}


[gcode_macro TUNE_PROBE]
description: Narrated probe z-offset calibration - paper test with TESTZ, then ACCEPT; announces and saves itself (ABORT announces too)
gcode:
    ; watched by cal-watch.sh OUTSIDE the gcode queue - a delayed_gcode watcher
    ; stalls while calibration commands hold the queue, so its lines played late.
    ; ACCEPT leaves a pending config change, ABORT leaves nothing: the watcher
    ; announces complete+saves, or announces aborted, accordingly.
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} calibrating probe"{% endif %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
    {% endif %}
    M117 Paper test: TESTZ Z=-.1 etc, then ACCEPT - saves itself
    SET_GCODE_VARIABLE MACRO=_CAL_QUIET VARIABLE=q VALUE=1   ; we already announced
    PROBE_CALIBRATE

[gcode_macro NOZZLE_PARK]
description: Bring the nozzle to a comfortable work position (homes first if needed), narrated
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
    {% endif %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} parking nozzle"{% endif %}
    G90
    ; never DESCEND to the work height - if the head is already above Z100
    ; (e.g. after a tall print still on the bed), stay there; only ever raise.
    {% set Z = [printer.toolhead.position.z|float, 100]|max %}
    G0 Z{Z} F1200
    G0 X117 Y20 F6000
    M400                              ; head has ARRIVED...
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} nozzle parked"{% endif %}

[gcode_macro MOTORS_RELEASE]
description: Release all steppers so axes can be moved by hand, narrated
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    M84
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} motors released"{% endif %}


# ----------------------------- LIGHTS ---------------------------------
# Requires the [led LED_Light] section in printer.cfg on ALL printers
# (Unicorn needs its output_pin swapped - see MACROS-GUIDE.md).

[gcode_macro LIGHTS_ON]
description: Bed lights on
gcode:
    ; guarded so a printer without the LED section (fresh rebuild from the
    ; reference config, which names it top_LEDs) doesn't abort PRINT_START
    {% if "led LED_Light" in printer %}
      SET_LED LED=LED_Light WHITE=1
    {% endif %}

[gcode_macro LIGHTS_OFF]
description: Bed lights off
gcode:
    {% if "led LED_Light" in printer %}
      SET_LED LED=LED_Light WHITE=0
    {% endif %}

[gcode_macro LIGHTS]
description: Toggle bed lights (the one-button light switch; ON/OFF remain as helpers)
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if "led LED_Light" not in printer %}
      {action_respond_info("No [led LED_Light] section on this printer")}
    {% elif printer["led LED_Light"].color_data[0][3] > 0 %}
      LIGHTS_OFF
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} light off"{% endif %}
    {% else %}
      LIGHTS_ON
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} light on"{% endif %}
    {% endif %}


# ----------------------------- SOUNDS ---------------------------------
# Requires the gcode_shell_command extension (KIAUH -> Advanced) to be
# installed BEFORE this file loads, or Klipper errors on startup.
# Theme buttons appear in Fluidd's macro panel and on the KlipperScreen
# tablet. The theme is pad-wide: switching from any printer switches all.

[gcode_shell_command set_theme]
command: /home/sonic/set-sound-theme.sh
timeout: 15

[gcode_shell_command chime]
command: /home/sonic/play_chime.sh
timeout: 10

[gcode_macro SOUND_THEME]
description: Cycle to the next sound theme; or jump straight there with THEME=Doom (Arcade/Default/Doom/Rangers/Zen)
gcode:
    {% set T = params.THEME|default("next") %}
    RUN_SHELL_COMMAND CMD=set_theme PARAMS={T}

[gcode_macro SOUND_TEST]
description: Play the active theme's done sound
gcode:
    RUN_SHELL_COMMAND CMD=chime PARAMS=/home/sonic/chimes/done.wav

[gcode_macro SOUND_MUTE]
description: Toggle ALL sounds on/off (thermal alerts still sound)
gcode:
    RUN_SHELL_COMMAND CMD=sound_toggle PARAMS=mute_toggle

[gcode_macro SOUND_NARRATION]
description: Toggle print-progress narration on/off (chimes & alerts unaffected)
gcode:
    RUN_SHELL_COMMAND CMD=sound_toggle PARAMS=narr_toggle

[gcode_macro SOUND_VOLUME_UP]
description: Speaker volume up
gcode:
    RUN_SHELL_COMMAND CMD=sound_toggle PARAMS=vol_up

[gcode_macro SOUND_VOLUME_DOWN]
description: Speaker volume down
gcode:
    RUN_SHELL_COMMAND CMD=sound_toggle PARAMS=vol_down

[gcode_macro SOUND_STACKING]
description: Toggle voice stacking - ON = voices overlap; OFF (default) = voices play in fleet order, no overlap. Chimes always overlap.
gcode:
    RUN_SHELL_COMMAND CMD=sound_toggle PARAMS=stack_toggle

[gcode_shell_command say]
command: /home/sonic/say.sh
timeout: 45

[gcode_shell_command narrate]
command: /home/sonic/narrate.sh
timeout: 45

[gcode_shell_command calwatch]
command: /home/sonic/cal-watch.sh
timeout: 10

[gcode_shell_command sound_toggle]
command: /home/sonic/sound_toggle.sh
timeout: 10

[gcode_shell_command runout_alert]
command: /home/sonic/runout_alert.sh
timeout: 10

[gcode_macro RUNOUT_ALERT]
description: Filament runout: distinct sound + spoken printer name (wired to the runout sensor)
gcode:
    ; names itself from machine.cfg; NAME= param still overrides if ever needed
    {% set WHO = params.NAME|default(printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "Printer") %}
    M117 {WHO} filament runout!
    SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=tripped VALUE=1
    ; runout_alert.sh waits for the PAUSE to land and be spoken FIRST, then alarms
    RUN_SHELL_COMMAND CMD=runout_alert PARAMS={WHO}
    ; start POLLING for filament's return - Klipper's insert_gcode is unreliable
    ; while paused (it gates on idle_timeout state), so we watch the sensor ourselves
    UPDATE_DELAYED_GCODE ID=_runout_watch DURATION=4

[gcode_macro _RUNOUT_STATE]
description: internal - remembers that the current pause was runout-caused
variable_tripped: 0
gcode:
    ; state holder only

[gcode_macro RUNOUT_INSERT]
description: internal - sensor insert_gcode fast-path (when it fires); the poller is the reliable one
gcode:
    ; bonus fast-path: if Klipper DOES fire insert_gcode, resume a touch sooner.
    ; guarded by the tripped flag so it can't double-fire with the poller.
    _RUNOUT_TRY_RESUME

[delayed_gcode _runout_watch]
gcode:
    ; poll every 4s while a runout pause is active. Reliable where insert_gcode
    ; is not - reads the sensor's own filament_detected status directly.
    {% if not printer.pause_resume.is_paused %}
      SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=tripped VALUE=0   ; pause ended - stand down
    {% elif printer["gcode_macro _RUNOUT_STATE"].tripped == 1 %}
      {% if printer["filament_switch_sensor filament_sensor"].filament_detected %}
        _RUNOUT_TRY_RESUME
      {% else %}
        UPDATE_DELAYED_GCODE ID=_runout_watch DURATION=4                ; keep watching
      {% endif %}
    {% endif %}

[gcode_shell_command runout_feed]
command: /home/sonic/runout-feed.sh
timeout: 5

[gcode_macro _RUNOUT_TRY_RESUME]
description: internal - once filament is back, launch the GUIDED manual feed (single-fire via tripped)
gcode:
    ; an auto-resume can't push new filament through the hotend, so instead of
    ; resuming we hand off to runout-feed.sh: it parks the head, then the user
    ; presses the X endstop on the head bar to feed, then again to purge+resume.
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if printer.pause_resume.is_paused
          and printer["gcode_macro _RUNOUT_STATE"].tripped == 1
          and printer["filament_switch_sensor filament_sensor"].filament_detected %}
      SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=tripped VALUE=0    ; claim it (blocks double-fire)
      M117 Filament detected - guided feed
      {% if NAME != "" %}RUN_SHELL_COMMAND CMD=runout_feed PARAMS="{NAME}"{% endif %}
    {% endif %}

# (the old auto-resume _runout_resume is retired - runout-feed.sh drives the
#  guided manual feed instead, since filament must be pushed through the hotend)


# ------------------------------ FLEET ---------------------------------
# Farm-wide commands: one button drives ALL FOUR printers, via fleet.sh
# hitting each instance's Moonraker API. Works from any printer's Fluidd
# or the KlipperScreen tablet.

[gcode_shell_command fleet]
command: /home/sonic/fleet.sh
timeout: 30

[gcode_macro FLEET_LIGHTS_ON]
description: All four printers - lights on
gcode:
    ; THIS printer switches locally (instant) - a curl back to our own busy
    ; gcode queue would deadlock until timeout (the "current printer lags" bug).
    ; fleet.sh then hits only the OTHER three.
    {% set N = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    LIGHTS_ON
    {% if N != "" %}
      RUN_SHELL_COMMAND CMD=fleet PARAMS="gcode_except {N} LIGHTS_ON"
    {% else %}
      RUN_SHELL_COMMAND CMD=fleet PARAMS="gcode LIGHTS_ON"   ; no name -> just hit everyone
    {% endif %}
    RUN_SHELL_COMMAND CMD=say PARAMS="all lights on"   ; system (Omega) voice

[gcode_macro FLEET_LIGHTS_OFF]
description: All four printers - lights off
gcode:
    {% set N = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    LIGHTS_OFF
    {% if N != "" %}
      RUN_SHELL_COMMAND CMD=fleet PARAMS="gcode_except {N} LIGHTS_OFF"
    {% else %}
      RUN_SHELL_COMMAND CMD=fleet PARAMS="gcode LIGHTS_OFF"
    {% endif %}
    RUN_SHELL_COMMAND CMD=say PARAMS="all lights off"   ; system (Omega) voice


# ------------------------------ HOMING --------------------------------
# G28 override: speaks which axes are homing before doing it, in this
# printer's own voice. Axis detection MUST use params (Klipper strips gcode
# comments before building params; rawparams keeps them - "home all aXes"
# would false-match X). rawparams is only for the re-emit. G28 with no args
# = all axes. Every caller (PRINT_START, G29, NOZZLE_PARK, shaping) flows
# through here, so homing is always announced.

[gcode_macro G28]
description: Home the requested axes, announced in this printer's voice
rename_existing: G28.1                       ; must be traditional (letter+number) - G28_BASE is rejected as a type mismatch
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    # axis detection uses params, which Klipper populates AFTER stripping any
    # gcode comment - so a file line like "G28 (comment) home all aXes" can never
    # read a comment letter as an axis. (Never put literal semicolon/hash chars
    # inside Jinja here: the config parser treats them as comments and truncates
    # the template - that exact bug halted the fleet once.)
    {% set X = 'X' in params %}
    {% set Y = 'Y' in params %}
    {% set Z = 'Z' in params %}
    {% if NAME != "" %}
      {% if not X and not Y and not Z %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} homing all axis"
      {% elif X and Y and not Z %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} homing x and y axis"
      {% elif X and not Y and not Z %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} homing x axis"
      {% elif Y and not X and not Z %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} homing y axis"
      {% elif Z and not X and not Y %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} homing z axis"
      {% else %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} homing all axis"
      {% endif %}
    {% endif %}
    G28.1 {rawparams}


# ----------------------- BASE-COMMAND WRAPPERS -------------------------
# The pad's touchscreen (KlipperScreen) and Fluidd's built-in panels call the
# RAW Klipper commands, not our buttons. Wrapping the raw commands means every
# entry point - our macros, the pad UI, the console, a slicer - narrates and
# auto-saves the same way. Our buttons set _CAL_QUIET before calling so their
# own announce-first lines aren't doubled by the wrapper.

[gcode_macro _CAL_QUIET]
description: internal - set to 1 by our buttons to suppress the wrapper's start line
variable_q: 0
gcode:
    ; state holder only

[gcode_macro PROBE_CALIBRATE]
description: Narrated z-offset calibration from ANY UI - auto-saves on ACCEPT, announces ABORT
rename_existing: PROBE_CALIBRATE_BASE
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% set Q = printer["gcode_macro _CAL_QUIET"].q|int %}
    SET_GCODE_VARIABLE MACRO=_CAL_QUIET VARIABLE=q VALUE=0
    {% if NAME != "" and Q == 0 %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} calibrating probe"{% endif %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=calwatch PARAMS="probe {NAME}"{% endif %}
    PROBE_CALIBRATE_BASE {rawparams}

[gcode_macro SCREWS_TILT_CALCULATE]
description: Narrated screws-tilt measurement from ANY UI
rename_existing: SCREWS_TILT_CALCULATE_BASE
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% set Q = printer["gcode_macro _CAL_QUIET"].q|int %}
    SET_GCODE_VARIABLE MACRO=_CAL_QUIET VARIABLE=q VALUE=0
    {% if NAME != "" and Q == 0 %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} screw tilt adjust"{% endif %}
    SCREWS_TILT_CALCULATE_BASE {rawparams}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} screw tilt adjust complete"{% endif %}

[gcode_macro BED_MESH_CALIBRATE]
description: Narrated meshing from ANY UI - "probing print area" (adaptive w/ objects) or "leveling bed"
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% set Q = printer["gcode_macro _CAL_QUIET"].q|int %}
    SET_GCODE_VARIABLE MACRO=_CAL_QUIET VARIABLE=q VALUE=0
    {% set ADAPT = params.ADAPTIVE|default(0)|int == 1 %}   ; params is comment-stripped (hard lesson: rawparams is not)
    {% set OBJS = "exclude_object" in printer and printer["exclude_object"].objects|length > 0 %}
    {% if NAME != "" and Q == 0 %}
      {% if ADAPT and OBJS %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} probing print area"
      {% else %}
        RUN_SHELL_COMMAND CMD=narrate PARAMS="{NAME} leveling bed"
      {% endif %}
    {% endif %}
    BED_MESH_CALIBRATE_BASE {rawparams}


# ----------------------------- SAVE_CONFIG -----------------------------
# Global wrapper: SAVE_CONFIG restarts Klipper, so ANNOUNCE it first - covers
# every save: the auto-saving tuning macros, the twist watcher, the input
# shaper's save, and a manual SAVE_CONFIG typed after TUNE_PROBE.

[gcode_macro SAVE_CONFIG]
description: Save pending config changes - announces the save and restart, then saves
rename_existing: SAVE_CONFIG_BASE
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} saving configuration"{% endif %}
    {% if NAME != "" %}RUN_SHELL_COMMAND CMD=say PARAMS="{NAME} restarting"{% endif %}
    SAVE_CONFIG_BASE {rawparams}


# ------------------------- MARLIN-COMPAT SHIMS -------------------------
# Thin aliases so slicer G-code written for Marlin keeps working.

[gcode_macro G29]
description: Marlin-compat - home + adaptive mesh
gcode:
    G28
    BED_MESH_CALIBRATE ADAPTIVE=1

[gcode_macro M420]
description: Marlin-compat - load the saved default mesh (S0 clears, like Marlin)
gcode:
    {% if params.S|default(1)|int == 0 %}
      BED_MESH_CLEAR                  ; Marlin M420 S0 = leveling OFF
    {% elif "default" in printer.bed_mesh.profiles %}
      BED_MESH_PROFILE LOAD=default
    {% else %}
      {action_respond_info("No saved mesh named 'default' yet - run BED_LEVELING first (it saves automatically)")}
    {% endif %}

[gcode_macro M600]
description: Marlin-compat - filament change requests become a pause
gcode:
    PAUSE


# ----------------------------- HELPERS --------------------------------
# _prefix hides these from Fluidd's macro buttons.

[gcode_macro _PARK_SAFE]
description: helper - bounded Z-hop then park rear, only if homed
gcode:
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% set z_target = [act_z + 10, max_z]|min %}
    {% if "xyz" in printer.toolhead.homed_axes %}
      G90
      G1 Z{z_target} F900
      G1 X{printer.toolhead.axis_maximum.x|float - 5} Y{printer.toolhead.axis_maximum.y|float - 5} F6000
    {% else %}
      {action_respond_info("Not homed - skipping park")}
    {% endif %}

[gcode_macro _PURGE_LINE]
description: helper - prime line along the front edge
gcode:
    G90
    M83
    G0 X5 Y5 F6000
    G0 Z0.3 F600
    G1 X100 E12 F1200
    G1 X140 E8 F1200
    G0 Z1 F600


# ------------------------------- CAMERA --------------------------------
# The farm camera is persona-free: events play chimes from ~/cam-chimes/
# (cam-watch.sh handles plug/unplug automatically; this button is the
# manual snapshot).

[gcode_shell_command cam_snapshot]
command: /home/sonic/cam-snapshot.sh
timeout: 15

[gcode_macro SNAPSHOT]
description: Save a timestamped still from the farm camera (shutter chime at capture)
gcode:
    RUN_SHELL_COMMAND CMD=cam_snapshot


[gcode_macro _SILLY_HOME]
description: internal - busy-guarded SILENT all-home for the shows (a print started mid-show must never be interrupted)
gcode:
    {% if printer.print_stats.state in ('printing','paused') %}
      M117 busy - skipping show home
    {% else %}
      G28.1
    {% endif %}

[gcode_macro _RACE_STAGE]
description: internal - level the starting grid at Z15 so every lap races the same course (called by race.sh)
gcode:
    {% if printer.print_stats.state in ('printing','paused') %}
      M117 busy - sitting this one out
    {% else %}
      G90
      G1 Z15 F900
      M400
    {% endif %}

[gcode_macro _LEDW]
description: internal - set bed light brightness 0-1, safely (show lighting rig)
gcode:
    {% if "led LED_Light" in printer %}
      SET_LED LED=LED_Light WHITE={params.W|default(1)|float}
    {% endif %}

# ------------------------------- SILLY ---------------------------------
# The fun shelf. SILLY_RANGERS: original hero fanfare, roll call in fleet
# order (each printer dances as its name plays), a beat of silence, then
# every voice shouts GO GO POWER PRINTERS at once, and the whole fleet
# homes all axes. Busy printers sit the dancing out automatically.

[gcode_shell_command rangers]
command: /home/sonic/rangers.sh
timeout: 10

[gcode_macro SILLY_RANGERS]
description: Fleet morph sequence - fanfare, roll call with choreography, battle cry, all home
gcode:
    M117 GO GO POWER PRINTERS!
    RUN_SHELL_COMMAND CMD=rangers

[gcode_macro _RANGER_DANCE]
description: internal - this printer's roll-call dance (called by rangers.sh)
gcode:
    {% set NAME = printer["gcode_macro _MACHINE"].name if "gcode_macro _MACHINE" in printer else "" %}
    # belt-and-braces busy guard: rangers.sh already skips busy printers, but
    # if this ever lands on one mid-print it must do nothing but say so
    {% if printer.print_stats.state in ('printing','paused') %}
      M117 busy - sitting this one out
    {% else %}
      {% if 'x' not in printer.toolhead.homed_axes|lower or 'y' not in printer.toolhead.homed_axes|lower %}
        G28.1 X Y
      {% endif %}
      _LEDW W=1
      G90
      {% set N = NAME|lower %}
      {% if N == 'omega' %}
        # the leader: full-width salute sweep, then a bed lunge
        G1 X225 F9000
        G1 X10 F9000
        G1 X117 F9000
        G1 Y40 F7200
        G1 Y190 F7200
        G1 Y115 F7200
      {% elif N == 'unicorn' %}
        # the excitable one: bed shimmy, head bounce, center pose
        G1 Y95 F7200
        G1 Y140 F7200
        G1 Y95 F7200
        G1 Y140 F7200
        G1 X80 F9000
        G1 X155 F9000
        G1 X117 Y117 F9000
      {% elif N == 'dimeter' %}
        # the precise one: staircase zigzag to center
        G1 X60 Y60 F9000
        G1 X90 F9000
        G1 Y90 F7200
        G1 X130 F9000
        G1 Y130 F7200
        G1 X170 F9000
        G1 Y170 F7200
        G1 X117 Y117 F9000
      {% else %}
        # the dramatic one: slow power poses with held beats
        G1 X117 Y40 F6000
        G4 P250
        G1 Y195 F6000
        G4 P250
        G1 X55 F9000
        G1 X180 F9000
        G1 X117 Y117 F7200
      {% endif %}
      M400
    {% endif %}

[gcode_shell_command invaders]
command: /home/sonic/invaders.sh
timeout: 10

[gcode_macro SILLY_INVADERS]
description: Fleet Space Invaders - synced descent march to the Arcade sounds, shot down one by one, then all home
gcode:
    M117 THE FLEET IS DESCENDING
    RUN_SHELL_COMMAND CMD=invaders

[gcode_macro _INVADER_POSE]
description: internal - silent full home if needed (called by invaders.sh before the ascent)
gcode:
    {% if printer.print_stats.state in ('printing','paused') %}
      M117 busy - sitting this one out
    {% else %}
      {% set homed = printer.toolhead.homed_axes|lower %}
      {% if 'x' not in homed or 'y' not in homed or 'z' not in homed %}
        G28.1
      {% endif %}
      M400
    {% endif %}

[gcode_macro _INVADER_RISE]
description: internal - ascend into the invader formation (called by invaders.sh)
gcode:
    {% if printer.print_stats.state in ('printing','paused') %}
      M117 busy - sitting this one out
    {% else %}
      G90
      _LEDW W=0.2
      G1 Z115 F900
      _LEDW W=0.6
      G1 X10 Y117 F9000
      _LEDW W=1
      M400
    {% endif %}

[gcode_macro _INVADER_MARCH]
description: internal - the synced invader descent, all ABSOLUTE moves (no G91 to leak if aborted); across in X, DROP a row in Z, each row faster (called by invaders.sh)
gcode:
    {% if printer.print_stats.state in ('printing','paused') %}
      M117 busy - sitting this one out
    {% else %}
      G90
      # row 1 - stately (from X10 Z115)
      _LEDW W=1
      G1 X60 F6000
      G4 P330
      _LEDW W=0.15
      G1 X110 F6000
      G4 P330
      _LEDW W=1
      G1 X160 F6000
      G4 P330
      _LEDW W=0.15
      G1 X210 F6000
      G4 P330
      _LEDW W=1
      G1 Z80 F900
      G4 P200
      # row 2 - closing in (back across)
      _LEDW W=0.15
      G1 X160 F7200
      G4 P210
      _LEDW W=1
      G1 X110 F7200
      G4 P210
      _LEDW W=0.15
      G1 X60 F7200
      G4 P210
      _LEDW W=1
      G1 X10 F7200
      G4 P210
      _LEDW W=1
      G1 Z45 F900
      G4 P200
      # row 3 - they're right on top of us
      _LEDW W=0.15
      G1 X60 F9000
      G4 P90
      _LEDW W=1
      G1 X110 F9000
      G4 P90
      _LEDW W=0.15
      G1 X160 F9000
      G4 P90
      _LEDW W=1
      G1 X210 F9000
      G4 P90
      _LEDW W=1
      G1 Z10 F900
      M400
    {% endif %}

[gcode_shell_command cradle]
command: /home/sonic/cradle.sh
timeout: 10

[gcode_macro SILLY_CRADLE]
description: Fleet Newton's cradle - beads rise to half Z, align left, and the clack runs Trident to Omega and back (Zen gong on every hit)
