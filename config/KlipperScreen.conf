# KlipperScreen.conf - one touchscreen driving four printers on one Sonic Pad.
# Place at: ~/KlipperScreen.conf   then:  sudo systemctl restart KlipperScreen
#
# EDIT THIS to your own names and ports. The author's setup (rename freely):
#   Omega   = moonraker-OMEGA   = port 7128 (also the port-80 default in Fluidd)
#   Unicorn = moonraker-UNICORN = port 7125
#   Dimeter = moonraker-DIMETER = port 7126
#   Trident = moonraker-TRIDENT = port 7127
# Each [printer <Name>] points KlipperScreen at that instance's Moonraker.
# Docs:    https://klipperscreen.readthedocs.io/en/latest/Configuration/
# Theming: https://klipperscreen.readthedocs.io/en/latest/Theming/

[main]
default_printer: Omega

[printer Omega]
moonraker_host: 127.0.0.1
moonraker_port: 7128

[printer Unicorn]
moonraker_host: 127.0.0.1
moonraker_port: 7125

[printer Dimeter]
moonraker_host: 127.0.0.1
moonraker_port: 7126

[printer Trident]
moonraker_host: 127.0.0.1
moonraker_port: 7127
