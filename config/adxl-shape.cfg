# adxl-shape.cfg - accelerometer + resonance tester for input shaping.
# The Sonic Pad has ONE ADXL345 on SPI (spidev2.0) behind the linux host MCU
# (/tmp/klipper_host_mcu); only one printer's Klipper can own it at a time.
# shape.sh copies THIS master into the active printer's config/adxl.cfg and
# blanks it for the others. Edit here (not per-printer) and re-assign.
[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:None
spi_speed: 2000000
spi_bus: spidev2.0

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 70
probe_points:
    110, 110, 20        # bed center (~225x225), 20mm up - where it shakes to measure
